version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: whatsbiz_postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: whatsbiz_db
    ports:
      - "5436:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - whatsbiz_network

  redis:
    image: redis:7-alpine
    container_name: whatsbiz_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - whatsbiz_network

  minio:
    image: minio/minio:latest
    container_name: whatsbiz_minio
    restart: always
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadminpassword
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - whatsbiz_network

networks:
  whatsbiz_network:
    name: whatsbiz_network
    driver: bridge

volumes:
  postgres_data:
    name: whatsbiz_postgres_data
  redis_data:
    name: whatsbiz_redis_data
  minio_data:
    name: whatsbiz_minio_data
